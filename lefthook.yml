pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx,json,jsonc}"
      run: npx biome check {staged_files}
    tsc:
      glob: "*.{ts,tsx}"
      run: npx tsc --noEmit
    vitest:
      glob: "*.{ts,tsx}"
      run: npx vitest run

pre-push:
  commands:
    # Non-blocking heads-up about dependencies a major version behind.
    # Throttled to once a day; never fails the push.
    deps-freshness:
      run: node scripts/check-deps-freshness.mjs
